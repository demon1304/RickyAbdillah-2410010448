<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoring Titik Kemacetan Banjarmasin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: linear-gradient(135deg,#0f172a,#1e293b,#334155);
    min-height:100vh;
    color:white;
}

header{
    text-align:center;
    padding:60px 20px;
    animation:fadeDown 1s ease;
}

header h1{
    font-size:3rem;
    margin-bottom:10px;
    background:linear-gradient(to right,#38bdf8,#60a5fa,#818cf8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

header p{
    color:#cbd5e1;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:40px;
}

.stat-card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:25px;
    text-align:center;
    transition:0.4s;
    border:1px solid rgba(255,255,255,0.1);
}

.stat-card:hover{
    transform:translateY(-10px);
    box-shadow:0 15px 30px rgba(0,0,0,.4);
}

.stat-card h2{
    font-size:2.2rem;
    color:#38bdf8;
}

.section-title{
    text-align:center;
    margin:40px 0;
    font-size:2rem;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
    margin-bottom:50px;
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:25px;
    transition:0.4s;
    border:1px solid rgba(255,255,255,0.1);
    animation:fadeUp 1s ease;
}

.card:hover{
    transform:scale(1.04);
    box-shadow:0 15px 35px rgba(56,189,248,.3);
}

.card h3{
    color:#38bdf8;
    margin-bottom:10px;
}

.progress{
    width:100%;
    height:10px;
    background:#1e293b;
    border-radius:10px;
    overflow:hidden;
    margin:15px 0;
}

.bar{
    height:100%;
    border-radius:10px;
}

.high{
    width:95%;
    background:linear-gradient(to right,#ef4444,#f97316);
}

.medium{
    width:75%;
    background:linear-gradient(to right,#f59e0b,#eab308);
}

.low{
    width:55%;
    background:linear-gradient(to right,#22c55e,#84cc16);
}

footer{
    text-align:center;
    padding:20px;
    color:#94a3b8;
}

.glow{
    position:fixed;
    width:300px;
    height:300px;
    background:#38bdf8;
    filter:blur(180px);
    opacity:.2;
    top:0;
    left:0;
    z-index:-1;
}

.glow2{
    position:fixed;
    width:300px;
    height:300px;
    background:#8b5cf6;
    filter:blur(180px);
    opacity:.2;
    bottom:0;
    right:0;
    z-index:-1;
}

@keyframes fadeDown{
    from{
        opacity:0;
        transform:translateY(-40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>

<div class="glow"></div>
<div class="glow2"></div>

<header>
    <h1>🚦 Monitoring Kemacetan Banjarmasin</h1>
    <p>Sistem Informasi Titik Kemacetan Kota Banjarmasin</p>
</header>

<div class="container">

    <div class="stats">
        <div class="stat-card">
            <h2>5</h2>
            <p>Titik Kemacetan Utama</p>
        </div>

        <div class="stat-card">
            <h2>95%</h2>
            <p>Kepadatan Tertinggi</p>
        </div>

        <div class="stat-card">
            <h2>07.00 - 08.30</h2>
            <p>Jam Sibuk Pagi</p>
        </div>

        <div class="stat-card">
            <h2>16.30 - 18.00</h2>
            <p>Jam Sibuk Sore</p>
        </div>
    </div>

    <h2 class="section-title">📍 Daftar Titik Kemacetan</h2>

    <div class="grid">

        <div class="card">
            <h3>Jalan Ahmad Yani</h3>
